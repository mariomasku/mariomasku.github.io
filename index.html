*{

}

  display:flex;
  flex-direction: column;
}

.sidebar{
  width:280px;
  background:rgba(10,15,30,0.88);

  border-right:1px solid var(--border);
  padding:28px;
  position:sticky;
  top:0;
  height:100vh;
}

.logo{

  align-items:center;
  gap:14px;
  margin-bottom:40px;
}

.logo-icon{

  height:52px;
  border-radius:16px;

}

.menu button:hover,

  height:140px;

.card-top{

.app-info h3{

}

.favorite.active{

.desc{

  font-size:14px;

  margin-bottom:18px;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:20px;

.tag{

.btn:hover{

let currentFilter = 'Todos';
let editIndex = null;

function getAllTags(){
 const tags = new Set();
 tools.forEach(t => {
   tags.add(t.category);
   t.tags.forEach(tag => tags.add(tag));
 });
 return ['Todos', ...Array.from(tags)];
}

function renderFilters(){
 const filters = document.getElementById('filters');
 filters.innerHTML = '';

 getAllTags().forEach(tag => {
   filters.innerHTML += `<button class="filter-btn ${currentFilter===tag?'active':''}" onclick="setFilter('${tag}')">${tag}</button>`;
 });
}

function setFilter(tag){
 currentFilter = tag;
 renderFilters();
 renderCategories();
}

function renderCategories(){
 const container = document.getElementById('categoriesContainer');
 const search = document.getElementById('search').value.toLowerCase();
 container.innerHTML='';

 const categories = [...new Set(tools.map(t=>t.category))];

 categories.forEach(category=>{
   const filtered = tools.filter(tool=>{
     const matchSearch = tool.name.toLowerCase().includes(search) || tool.description.toLowerCase().includes(search);
     const matchFilter = currentFilter==='Todos' || tool.category===currentFilter || tool.tags.includes(currentFilter);
     return tool.category===category && matchSearch && matchFilter;
   });

   if(filtered.length===0) return;

   const block = document.createElement('div');
   block.className='category-block';

   block.innerHTML=`
     <h2 class="category-title">${category}</h2>
     <div class="apps-grid">
       ${filtered.map(tool=>`
         <a class="app-card" href="${tool.url}" target="_blank">
           <div class="tooltip">
             <h4>${tool.name}</h4>
             <p>${tool.description}</p>
             <div class="tooltip-tags">
               ${tool.tags.map(tag=>`<span class="tooltip-tag">${tag}</span>`).join('')}
             </div>
           </div>

           <div class="app-icon">
             <img src="https://www.google.com/s2/favicons?domain=${new URL(tool.url).hostname}&sz=128">
           </div>

           <div class="app-name">${tool.name}</div>
         </a>
       `).join('')}
     </div>
   `;

   container.appendChild(block);
 });

 renderAdminList();
}

function toggleAdminPanel(){
 document.getElementById('adminPanel').classList.toggle('hidden');
}

function renderAdminList(){
 const list = document.getElementById('adminList');
 list.innerHTML='';

 tools.forEach((tool,index)=>{
   list.innerHTML += `
   <div class="admin-item">
     <div class="admin-item-top">
       <strong>${tool.name}</strong>
       <span>${tool.category}</span>
     </div>

     <div class="admin-actions">
       <button class="edit-action" onclick="editTool(${index})">Editar</button>
       <button class="delete-action" onclick="deleteTool(${index})">Eliminar</button>
     </div>
   </div>
   `;
 });
}

function editTool(index){
 editIndex=index;
 const tool=tools[index];

 document.getElementById('toolName').value=tool.name;
 document.getElementById('toolUrl').value=tool.url;
 document.getElementById('toolCategory').value=tool.category;
 document.getElementById('toolTags').value=tool.tags.join(', ');
 document.getElementById('toolDescription').value=tool.description;
}

function saveTool(){
 const tool={
   name:document.getElementById('toolName').value,
   url:document.getElementById('toolUrl').value,
   category:document.getElementById('toolCategory').value,
   tags:document.getElementById('toolTags').value.split(',').map(t=>t.trim()),
   description:document.getElementById('toolDescription').value
 };

 if(editIndex===null){
   tools.push(tool);
 } else {
   tools[editIndex]=tool;
 }

 editIndex=null;
 renderFilters();
 renderCategories();
}

function deleteTool(index){
 tools.splice(index,1);
 renderFilters();
 renderCategories();
}

document.getElementById('search').addEventListener('input', renderCategories);

renderFilters();
renderCategories();
</script>
</body>
</html>
