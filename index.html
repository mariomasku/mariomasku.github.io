<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Hub OS</title>
<!-- ACTUALIZADO: tarjetas compactas, todas las URLs incluidas, filtros por etiquetas, edición y eliminación -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0b1020;
  --panel:#12192b;
  --panel-2:#1a2338;
  --border:#2a3550;
  --text:#f3f4f6;
  --muted:#9ca3af;
  --accent:#60a5fa;
  --accent-2:#8b5cf6;
  --success:#34d399;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Inter',sans-serif;
  background:radial-gradient(circle at top,#1b2440 0%,#0b1020 40%);
  color:var(--text);
  min-height:100vh;
  display:flex;
}

.sidebar{
  width:280px;
  background:rgba(10,15,30,0.88);
  backdrop-filter:blur(20px);
  border-right:1px solid var(--border);
  padding:28px;
  position:sticky;
  top:0;
  height:100vh;
}

.logo{
  display:flex;
  align-items:center;
  gap:14px;
  margin-bottom:40px;
}

.logo-icon{
  width:52px;
  height:52px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2));
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:800;
  font-size:20px;
}

.logo h1{
  font-size:22px;
}

.logo p{
  color:var(--muted);
  font-size:13px;
}

.menu{
  display:flex;
  flex-direction:column;
  gap:12px;
}

.menu button{
  background:transparent;
  border:1px solid transparent;
  color:var(--muted);
  padding:14px;
  border-radius:14px;
  cursor:pointer;
  text-align:left;
  transition:0.25s;
  font-size:15px;
}

.menu button:hover,
.menu button.active{
  background:var(--panel-2);
  color:white;
  border-color:var(--border);
}

.main{
  flex:1;
  padding:40px;
}

.topbar{
  display:flex;
  gap:20px;
  margin-bottom:30px;
  flex-wrap:wrap;
}

.search{
  flex:1;
  min-width:240px;
  background:rgba(20,28,48,0.85);
  border:1px solid var(--border);
  border-radius:18px;
  padding:18px 20px;
  color:white;
  font-size:15px;
}

.stats{
  display:flex;
  gap:14px;
}

.stat-card{
  background:rgba(18,25,43,0.8);
  border:1px solid var(--border);
  padding:16px 20px;
  border-radius:18px;
  min-width:140px;
}

.stat-card h3{
  font-size:24px;
  margin-bottom:4px;
}

.stat-card p{
  color:var(--muted);
  font-size:13px;
}

.section{
  margin-bottom:55px;
}

.section-header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

.section h2{
  font-size:28px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:22px;
}

.card{
  background:rgba(18,25,43,0.82);
  backdrop-filter:blur(16px);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:24px;
  padding:24px;
  position:relative;
  overflow:hidden;
  transition:0.28s;
}

.card:hover{
  transform:translateY(-6px);
  border-color:#4f75ff;
  box-shadow:0 20px 60px rgba(0,0,0,0.35);
}

.card::before{
  content:'';
  position:absolute;
  top:-40px;
  right:-40px;
  width:140px;
  height:140px;
  background:radial-gradient(circle,#60a5fa33 0%,transparent 70%);
}

.card-top{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:18px;
}

.app{
  display:flex;
  align-items:center;
  gap:14px;
}

.app img{
  width:48px;
  height:48px;
  border-radius:14px;
  background:white;
}

.app-info h3{
  font-size:19px;
}

.app-info span{
  color:var(--muted);
  font-size:13px;
}

.favorite{
  cursor:pointer;
  font-size:22px;
  opacity:0.6;
  transition:0.2s;
}

.favorite.active{
  opacity:1;
  color:#fbbf24;
}

.desc{
  color:#cfd6e4;
  line-height:1.65;
  font-size:14px;
  min-height:88px;
  margin-bottom:18px;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:20px;
}

.tag{
  padding:6px 11px;
  border-radius:999px;
  background:#202b46;
  border:1px solid #31405f;
  color:#9cc2ff;
  font-size:12px;
}

.card-actions{
  display:flex;
  gap:12px;
}

.btn{
  flex:1;
  text-align:center;
  text-decoration:none;
  padding:13px;
  border-radius:14px;
  font-weight:600;
  transition:0.2s;
}

.btn-primary{
  background:linear-gradient(135deg,#2563eb,#7c3aed);
  color:white;
}

.btn-secondary{
  background:#1f2937;
  color:#d1d5db;
  border:1px solid #374151;
}

.btn:hover{
  transform:translateY(-2px);
}

.notes{
  margin-top:18px;
}

.notes textarea{
  width:100%;
  background:#0f172a;
  border:1px solid #263247;
  border-radius:14px;
  padding:12px;
  color:white;
  resize:vertical;
  min-height:72px;
}

.footer{
  margin-top:80px;
  text-align:center;
  color:var(--muted);
}

@media(max-width:1100px){
  body{
    flex-direction:column;
  }

  .sidebar{
    width:100%;
    height:auto;
    position:relative;
  }
}
</style>
</head>
<body>

<div class="app-container">
  <aside class="sidebar">
    <h1>AI Hub OS</h1>
    <p class="sidebar-subtitle">Dashboard personal de herramientas IA</p>

    <input type="text" id="searchInput" placeholder="Buscar herramientas..." class="search-input">

    <div class="filter-title">Etiquetas</div>
    <div class="tag-filters" id="tagFilters"></div>

    <button class="add-btn" onclick="openAddModal()">+ Añadir herramienta</button>
  </aside>

  <main class="main-content">
    <div class="cards-grid" id="cardsGrid"></div>
  </main>
</div>

<div class="modal" id="toolModal">
  <div class="modal-content">
    <h2 id="modalTitle">Nueva herramienta</h2>

    <input id="toolName" placeholder="Nombre">
    <input id="toolUrl" placeholder="URL">
    <input id="toolTag" placeholder="Etiqueta">
    <textarea id="toolDesc" placeholder="Descripción"></textarea>

    <div class="modal-actions">
      <button onclick="saveTool()">Guardar</button>
      <button onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<style>
body{
  margin:0;
  background:#0f172a;
  color:white;
  font-family:Inter,sans-serif;
}

.app-container{
  display:flex;
  min-height:100vh;
}

.sidebar{
  width:300px;
  background:#111827;
  padding:24px;
  border-right:1px solid #1f2937;
  position:sticky;
  top:0;
  height:100vh;
  overflow:auto;
}

.sidebar h1{
  margin-bottom:6px;
}

.sidebar-subtitle{
  color:#94a3b8;
  margin-bottom:24px;
  font-size:14px;
}

.search-input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#1e293b;
  color:white;
  margin-bottom:24px;
}

.filter-title{
  margin-bottom:10px;
  color:#cbd5e1;
  font-size:14px;
}

.tag-filters{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-bottom:24px;
}

.tag-filter{
  padding:8px 12px;
  border-radius:999px;
  background:#1e293b;
  cursor:pointer;
  font-size:12px;
}

.tag-filter.active{
  background:#2563eb;
}

.add-btn{
  width:100%;
  padding:14px;
  border:none;
  border-radius:12px;
  background:#2563eb;
  color:white;
  cursor:pointer;
  font-weight:bold;
}

.main-content{
  flex:1;
  padding:24px;
}

.cards-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;
}

.card{
  background:#111827;
  border:1px solid #1f2937;
  border-radius:18px;
  padding:16px;
  transition:0.2s;
}

.card:hover{
  transform:translateY(-2px);
  border-color:#3b82f6;
}

.card-top{
  display:flex;
  align-items:center;
  gap:12px;
  margin-bottom:12px;
}

.card-top img{
  width:36px;
  height:36px;
  border-radius:10px;
}

.card h3{
  margin:0;
  font-size:16px;
}

.card p{
  color:#cbd5e1;
  font-size:13px;
  line-height:1.45;
  min-height:58px;
}

.tags{
  display:flex;
  flex-wrap:wrap;
  gap:6px;
  margin:12px 0;
}

.tag{
  background:#1e293b;
  padding:5px 9px;
  border-radius:999px;
  font-size:11px;
  color:#93c5fd;
}

.card-actions{
  display:flex;
  gap:8px;
}

.card-actions button,
.card-actions a{
  flex:1;
  text-align:center;
  border:none;
  border-radius:10px;
  padding:10px;
  text-decoration:none;
  cursor:pointer;
  font-size:13px;
}

.open-btn{
  background:#2563eb;
  color:white;
}

.edit-btn{
  background:#1e293b;
  color:white;
}

.delete-btn{
  background:#7f1d1d;
  color:white;
}

.modal{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.7);
  display:none;
  align-items:center;
  justify-content:center;
}

.modal-content{
  width:400px;
  background:#111827;
  padding:24px;
  border-radius:18px;
}

.modal-content input,
.modal-content textarea{
  width:100%;
  margin-top:12px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#1e293b;
  color:white;
}

.modal-actions{
  display:flex;
  gap:10px;
  margin-top:18px;
}

.modal-actions button{
  flex:1;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>

<script>
const tools = [
{name:'ChatGPT',url:'https://chat.openai.com/chat',tag:'Chat',desc:'Asistente IA generalista multimodal.'},
{name:'Claude',url:'https://claude.ai/new',tag:'Texto',desc:'Excelente para documentos y análisis largos.'},
{name:'DeepSeek',url:'https://www.deepseek.com/',tag:'Código',desc:'Modelo fuerte en razonamiento y programación.'},
{name:'Qwen',url:'https://chat.qwenlm.ai/',tag:'Chat',desc:'LLM multilingüe de Alibaba.'},
{name:'Gemini',url:'https://bard.google.com/',tag:'Google',desc:'IA integrada con el ecosistema Google.'},
{name:'Perplexity',url:'https://www.perplexity.ai/',tag:'Buscar',desc:'Buscador IA con referencias.'},
{name:'Blackbox',url:'https://www.blackbox.ai/',tag:'Código',desc:'Asistente IA para developers.'},
{name:'v0',url:'https://v0.dev/',tag:'Frontend',desc:'Generador IA de interfaces React.'},
{name:'Lovable',url:'https://lovable.dev/',tag:'Apps',desc:'Creación de apps mediante prompts.'},
{name:'Bolt',url:'https://bolt.new/',tag:'Apps',desc:'Desarrollo fullstack IA.'},
{name:'Udio',url:'https://www.udio.com/',tag:'Música',desc:'Generación musical IA.'},
{name:'Suno',url:'https://suno.com/',tag:'Música',desc:'Canciones completas con IA.'},
{name:'Riffusion',url:'https://www.riffusion.com/?filter=staff-picks',tag:'Música',desc:'Música generativa experimental.'},
{name:'DopeLoop',url:'https://dopeloop.ai/',tag:'Audio',desc:'Loops y composición IA.'},
{name:'RoEx Audio',url:'https://www.roexaudio.com/',tag:'Audio',desc:'Mezcla y mastering IA.'},
{name:'Kling AI',url:'https://klingai.com/',tag:'Vídeo',desc:'Vídeo IA cinematográfico.'},
{name:'Krea',url:'https://www.krea.ai/home',tag:'Imagen',desc:'Generación visual y upscale.'},
{name:'DALL·E',url:'https://openai.com/dall-e-2/',tag:'Imagen',desc:'Generador de imágenes OpenAI.'},
{name:'Ideogram',url:'https://ideogram.ai/t/explore',tag:'Imagen',desc:'Especializada en texto visual.'},
{name:'InVideo',url:'https://invideo.io/ai/',tag:'Vídeo',desc:'Creación automática de vídeos.'},
{name:'Tutorial IA',url:'https://eltecnologuia.com/crea-imagenes-de-cualquier-persona-con-ia-en-5-minutos-y-casi-gratis/',tag:'Tutorial',desc:'Tutorial de generación IA.'},
{name:'Pollo AI',url:'https://pollo.ai/',tag:'Imagen',desc:'Suite multimodal IA.'},
{name:'BananaPrompts',url:'https://bananaprompts.xyz/',tag:'Prompts',desc:'Biblioteca de prompts IA.'},
{name:'HIX Rewriter',url:'https://hix.ai/app/ai-writer/content-rewriter',tag:'Texto',desc:'Reescritura de textos IA.'},
{name:'GPTZero',url:'https://gptzero.me/',tag:'Detector',desc:'Detector de texto IA.'},
{name:'Parafrasear AI',url:'https://www.parafrasear.ai/humanizar-texto',tag:'Texto',desc:'Humanizador de textos IA.'},
{name:'ParaphraseTool',url:'https://www.paraphrasetool.ai/es/humanizar-el-texto-ai',tag:'Texto',desc:'Parafraseo y humanización.'},
{name:'Tripo3D',url:'http://www.tripo3d.ai/',tag:'3D',desc:'Generación de modelos 3D.'},
{name:'Higgsfield',url:'https://higgsfield.ai/',tag:'Vídeo',desc:'Vídeo y personajes IA.'},
{name:'WolframAlpha',url:'https://www.wolframalpha.com/',tag:'Ciencia',desc:'Motor computacional científico.'},
{name:'Adept',url:'https://www.adept.ai/',tag:'Agentes',desc:'Automatización IA.'},
{name:'LetsView AI',url:'https://letsview.com/ai-tools',tag:'Directorio',desc:'Catálogo de herramientas IA.'},
{name:'Sourcegraph',url:'https://sourcegraph.com/',tag:'Código',desc:'Búsqueda y comprensión de código.'},
{name:'BypassGPT',url:'https://bypassgpt.ai/',tag:'Detector',desc:'Bypass de detección IA.'},
{name:'HIX Bypass',url:'https://hix.ai/app/bypass-ai-detection',tag:'Detector',desc:'Evasión de detectores IA.'},
{name:'Apify',url:'https://apify.com/',tag:'Automatizar',desc:'Scraping y automatización web.'},
{name:'Abogado Virtual',url:'https://app.aiprm.com/gpts/g-j2sGXXAum/abogado-virtual-leyes-espana',tag:'Legal',desc:'GPT legal español.'},
{name:'Natural Readers',url:'https://www.naturalreaders.com/online/',tag:'Voz',desc:'Texto a voz natural.'},
{name:'Qwen Chat',url:'https://chat.qwen.ai/',tag:'Chat',desc:'Chat IA de Qwen.'},
{name:'v0 Chat',url:'https://v0.dev/chat',tag:'Frontend',desc:'Chat frontend IA.'},
{name:'Emergent',url:'https://app.emergent.sh/',tag:'Agentes',desc:'Plataforma de agentes IA.'},
{name:'OpenAI Usage',url:'https://platform.openai.com/usage',tag:'API',desc:'Control de uso API OpenAI.'},
{name:'21st.dev',url:'https://21st.dev/home',tag:'Frontend',desc:'Componentes UI modernos.'}
];

let currentTag = 'Todos';
let editIndex = null;

function renderCards(){
  const grid = document.getElementById('cardsGrid');
  const search = document.getElementById('searchInput').value.toLowerCase();

  grid.innerHTML='';

  tools
  .filter(tool => currentTag === 'Todos' || tool.tag === currentTag)
  .filter(tool => tool.name.toLowerCase().includes(search) || tool.tag.toLowerCase().includes(search))
  .forEach((tool,index)=>{
    grid.innerHTML += `
      <div class="card">
        <div class="card-top">
          <img src="https://www.google.com/s2/favicons?domain=${new URL(tool.url).hostname}&sz=64">
          <div>
            <h3>${tool.name}</h3>
          </div>
        </div>

        <p>${tool.desc}</p>

        <div class="tags">
          <span class="tag">${tool.tag}</span>
        </div>

        <div class="card-actions">
          <a class="open-btn" href="${tool.url}" target="_blank">Abrir</a>
          <button class="edit-btn" onclick="editTool(${index})">Editar</button>
          <button class="delete-btn" onclick="deleteTool(${index})">X</button>
        </div>
      </div>
    `;
  });
}

function renderTags(){
  const tags = ['Todos', ...new Set(tools.map(t=>t.tag))];
  const container = document.getElementById('tagFilters');

  container.innerHTML='';

  tags.forEach(tag=>{
    container.innerHTML += `
      <div class="tag-filter ${currentTag===tag?'active':''}" onclick="selectTag('${tag}')">${tag}</div>
    `;
  });
}

function selectTag(tag){
  currentTag = tag;
  renderTags();
  renderCards();
}

document.getElementById('searchInput').addEventListener('input', renderCards);

function deleteTool(index){
  tools.splice(index,1);
  renderCards();
  renderTags();
}

function editTool(index){
  editIndex=index;
  const tool=tools[index];

  document.getElementById('toolName').value=tool.name;
  document.getElementById('toolUrl').value=tool.url;
  document.getElementById('toolTag').value=tool.tag;
  document.getElementById('toolDesc').value=tool.desc;

  document.getElementById('toolModal').style.display='flex';
}

function openAddModal(){
  editIndex=null;
  document.getElementById('toolName').value='';
  document.getElementById('toolUrl').value='';
  document.getElementById('toolTag').value='';
  document.getElementById('toolDesc').value='';

  document.getElementById('toolModal').style.display='flex';
}

function closeModal(){
  document.getElementById('toolModal').style.display='none';
}

function saveTool(){
  const tool={
    name:document.getElementById('toolName').value,
    url:document.getElementById('toolUrl').value,
    tag:document.getElementById('toolTag').value,
    desc:document.getElementById('toolDesc').value
  };

  if(editIndex===null){
    tools.push(tool);
  } else {
    tools[editIndex]=tool;
  }

  closeModal();
  renderCards();
  renderTags();
}

renderTags();
renderCards();
</script>

</body>
</html>
