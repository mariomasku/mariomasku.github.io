<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Hub OS</title>
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5278/5278402.png">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5278/5278402.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* VARIABLES DE TEMA - MODO OSCURO POR DEFECTO */
    :root {
      --bg: #0f111a;
      --sidebar: #151824;
      --card: #1c2030;
      --card-hover: #23293d;
      --border: rgba(255, 255, 255, 0.06);
      --input-bg: #1c2030;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #4f46e5;
      --accent-hover: #6366f1;
      --shadow: rgba(0, 0, 0, 0.3);
      --tag-bg: rgba(79, 70, 229, 0.15);
      --tag-text: #818cf8;
    }

    /* VARIABLES MODO CLARO */
    [data-theme="light"] {
      --bg: #f8fafc;
      --sidebar: #ffffff;
      --card: #ffffff;
      --card-hover: #f1f5f9;
      --border: rgba(0, 0, 0, 0.06);
      --input-bg: #f1f5f9;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #4f46e5;
      --accent-hover: #3730a3;
      --shadow: rgba(0, 0, 0, 0.05);
      --tag-bg: rgba(79, 70, 229, 0.08);
      --tag-text: #4f46e5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.3s, border-color 0.3s, color 0.3s;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    .layout {
      display: flex;
    }

    /* BARRA LATERAL LIMPIA */
    .sidebar {
      width: 280px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 24px;
      z-index: 10;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .brand-logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content:center;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-weight: 700;
      font-size: 16px;
    }

    .brand h1 {
      font-size: 18px;
      font-weight: 600;
    }

    .brand p {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .search {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 14px;
      outline: none;
    }

    .search:focus {
      border-color: var(--accent);
    }

    .sidebar-section h3 {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    /* DESPLEGABLE MULTISELECCIÓN DE ETIQUETAS */
    .multiselect-container {
      position: relative;
    }

    .select-box {
      width: 100%;
      padding: 12px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
    }

    .dropdown-content {
      display: none;
      position: absolute;
      top: 105%;
      left: 0;
      right: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      max-height: 200px;
      overflow-y: auto;
      z-index: 20;
      box-shadow: 0 10px 25px var(--shadow);
      padding: 6px;
    }

    .dropdown-content.show {
      display: block;
    }

    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 6px;
    }

    .dropdown-item:hover {
      background: var(--card-hover);
    }

    .dropdown-item input {
      cursor: pointer;
    }

    /* BOTONES ACCIÓN LATERAL */
    .btn-action {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-action:hover {
      background: var(--card-hover);
    }

    .btn-primary-sidebar {
      background: var(--accent);
      color: white;
      border: none;
    }

    .btn-primary-sidebar:hover {
      background: var(--accent-hover);
    }

    .sidebar-footer {
      margin-top: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* CONTENIDO PRINCIPAL */
    .content {
      flex: 1;
      padding: 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .category-block {
      margin-bottom: 40px;
    }

    .category-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
      letter-spacing: -0.02em;
    }

    /* REJILLA DE TARJETAS ESTILO LETSVIEW */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
    }

    .app-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 12px;
      position: relative;
      box-shadow: 0 2px 8px var(--shadow);
    }

    .app-card:hover {
      transform: translateY(-2px);
      background: var(--card-hover);
      border-color: var(--accent);
    }

    .app-header-inline {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .app-icon {
      width: 48px;
      height: 48px;
      border-radius: 10px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }

    .app-icon img {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .app-name {
      font-weight: 600;
      font-size: 15px;
      line-height: 1.2;
    }

    .app-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
      min-height: 54px;
    }

    .tooltip-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: auto;
    }

    .tooltip-tag {
      background: var(--tag-bg);
      color: var(--tag-text);
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 500;
    }

    /* PANEL DE ADMINISTRACIÓN */
    .admin-panel {
      position: fixed;
      top: 0;
      right: 0;
      width: 400px;
      height: 100vh;
      background: var(--sidebar);
      border-left: 1px solid var(--border);
      padding: 24px;
      overflow-auto: auto;
      z-index: 100;
      box-shadow: -10px 0 30px rgba(0,0,0,0.2);
    }

    .hidden { display: none; }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .admin-form input, .admin-form textarea {
      width: 100%;
      margin-bottom: 12px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      padding: 12px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }

    .admin-item {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 12px;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 13px;
    }

    .admin-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }

    .admin-actions button {
      flex: 1;
      border: none;
      border-radius: 6px;
      padding: 8px;
      cursor: pointer;
      font-size: 12px;
      color: white;
    }

    .edit-action { background: #4b5563; }
    .delete-action { background: #dc2626; }

    @media(max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: relative; }
      .content { padding: 20px; }
    }
  </style>
</head>
<body>

<div class="layout">
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-logo">AI</div>
      <div>
        <h1>AI Hub OS</h1>
        <p>Tu Directorio Personal</p>
      </div>
    </div>

    <input id="search" type="text" placeholder="Buscar herramienta..." class="search">

    <div class="sidebar-section">
      <h3>Filtrar por Etiquetas</h3>
      <div class="multiselect-container">
        <div class="select-box" onclick="toggleDropdown()">
          <span id="selectedCount">Todas las etiquetas</span>
          <span>▼</span>
        </div>
        <div id="dropdownContent" class="dropdown-content"></div>
      </div>
    </div>

    <div class="sidebar-footer">
      <button class="btn-action" onclick="toggleTheme()">🌓 Cambiar Aspecto</button>
      <button class="btn-action btn-primary-sidebar" onclick="toggleAdminPanel()">🛠️ Administración</button>
    </div>
  </aside>

  <main class="content">
    <div id="categoriesContainer"></div>
  </main>
</div>

<div id="adminPanel" class="admin-panel hidden">
  <div class="admin-header">
    <h2>Gestionar Links</h2>
    <button class="btn-action" style="width:auto; padding:6px 12px;" onclick="toggleAdminPanel()">✕</button>
  </div>
  <div class="admin-form">
    <input id="toolName" placeholder="Nombre de la herramienta">
    <input id="toolUrl" placeholder="URL completa (https://...)">
    <input id="toolCategory" placeholder="Categoría (ej: Desarrollo)">
    <input id="toolTags" placeholder="Etiquetas (separadas por comas)">
    <textarea id="toolDescription" placeholder="Descripción en español..." rows="3"></textarea>
    <button class="btn-action btn-primary-sidebar" onclick="saveTool()">Guardar Entrada</button>
  </div>
  <div id="adminList"></div>
</div>

<script>
// BASE DE DATOS LOCAL CON TEXTOS TRADUCIDOS Y CORREGIDOS
let tools = JSON.parse(localStorage.getItem('aihub_tools')) || [
  {name:'ChatGPT',url:'https://chat.openai.com/',category:'Chat IA',tags:['LLM','Productividad','Multimodal'],description:'Asistente multimodal avanzado para redacción, programación, análisis y resolución de problemas cotidianos.'},
  {name:'Claude',url:'https://claude.ai/',category:'Desarrollo',tags:['LLM','Programación','Análisis'],description:'Modelo conversacional excelente en procesamiento de textos largos, lógica estructurada e ingeniería de software.'},
  {name:'Claude Code',url:'https://www.anthropic.com/claude-code',category:'Desarrollo',tags:['Terminal','Agentes','CLI'],description:'Agente de terminal avanzado diseñado para integrarse en repositorios locales y automatizar flujos de código.'},
  {name:'Perplexity',url:'https://www.perplexity.ai/',category:'Investigación',tags:['Buscador','Web','Referencias'],description:'Buscador conversacional que rastrea la web en tiempo real entregando fuentes fiables y resúmenes estructurados.'},
  {name:'DeepSeek',url:'https://www.deepseek.com/',category:'Desarrollo',tags:['LLM','Razonamiento','Código'],description:'Modelo enfocado en un razonamiento matemático superior, programación avanzada y eficiencia técnica abierta.'},
  {name:'Blackbox AI',url:'https://www.blackbox.ai/',category:'Desarrollo',tags:['Código','IDE'],description:'Asistente enfocado en autocompletado de código rápido, explicaciones de bugs y búsqueda contextual.'},
  {name:'Qwen AI',url:'https://chat.qwenlm.ai/',category:'Chat IA',tags:['LLM','Multilingüe'],description:'Ecosistema potente con capacidades multilingües óptimas y versatilidad en tareas lógicas.'},
  {name:'Gemini',url:'https://gemini.google.com/',category:'Chat IA',tags:['Google','Workspace'],description:'Modelo nativo multimodal integrado de forma nativa con los servicios de búsqueda y ecosistema de Google.'},
  {name:'v0',url:'https://v0.dev/',category:'Desarrollo',tags:['Frontend','UI','React'],description:'Generador de componentes de interfaz basados en React y Tailwind CSS mediante lenguaje natural.'},
  {name:'Lovable',url:'https://lovable.dev/',category:'Desarrollo',tags:['NoCode','Apps'],description:'Plataforma ágil para construir, desplegar e iterar aplicaciones web completas sin código técnico.'},
  {name:'Bolt.new',url:'https://bolt.new/',category:'Desarrollo',tags:['Fullstack','WebContainers'],description:'Entorno completo de desarrollo en el navegador que permite compilar aplicaciones full-stack de inicio a fin.'},
  {name:'21st.dev',url:'https://21st.dev/',category:'Desarrollo',tags:['UI','Componentes'],description:'Catálogo moderno de recursos y librerías visuales listas para implementar en desarrollos de vanguardia.'},
  {name:'Sourcegraph',url:'https://sourcegraph.com/',category:'Desarrollo',tags:['Código','Buscador'],description:'Plataforma avanzada para indexar, explorar y comprender extensas bases de código empresariales.'},
  {name:'Apify',url:'https://apify.com/',category:'Automatización',tags:['Scraping','Datos'],description:'Nube modular para la extracción de datos, web scraping y automatizaciones mediante bots e integraciones.'},
  {name:'Emergent',url:'https://app.emergent.sh/',category:'Agentes IA',tags:['Agentes','Automatización'],description:'Orquestador visual para definir flujos de trabajo autónomos controlados por agentes inteligentes.'},
  {name:'Adept',url:'https://www.adept.ai/',category:'Agentes IA',tags:['Automatización','Software'],description:'Modelos entrenados para interactuar directamente con interfaces digitales y software emulando al humano.'},
  {name:'Krea',url:'https://www.krea.ai/',category:'Imagen IA',tags:['Diseño','Generación'],description:'Herramienta creativa interactiva para escalado de imágenes, generación en tiempo real y edición artística.'},
  {name:'Ideogram',url:'https://ideogram.ai/',category:'Imagen IA',tags:['Tipografía','Diseño'],description:'Generador artístico de imágenes con una precisión excepcional en la renderización de textos y marcas.'},
  {name:'DALL·E',url:'https://openai.com/dall-e-3/',category:'Imagen IA',tags:['OpenAI','Ilustración'],description:'El clásico transformador de texto a imagen de OpenAI conocido por su estricto apego al prompt del usuario.'},
  {name:'Kling',url:'https://klingai.com/',category:'Vídeo IA',tags:['Cinematografía','Vídeo'],description:'Generador de clips de video hiperrealistas con movimientos coherentes físicos y calidad de cine.'},
  {name:'InVideo',url:'https://invideo.io/',category:'Vídeo IA',tags:['Edición','Guión'],description:'Automatiza la producción de videos comerciales recopilando multimedia, voz en off y guiones automáticamente.'},
  {name:'Higgsfield',url:'https://higgsfield.ai/',category:'Vídeo IA',tags:['Animación','Social'],description:'Aplicación enfocada en la creación y personalización dinámica de personajes animados con física real.'},
  {name:'Suno',url:'https://suno.com/',category:'Audio IA',tags:['Música','Composición'],description:'Generador musical capaz de orquestar canciones completas con voces realistas a partir de letras o estilos.'},
  {name:'Udio',url:'https://www.udio.com/',category:'Audio IA',tags:['Música','Producción'],description:'Herramienta de alta fidelidad para masterizar, extender y componer temas musicales en diversos géneros.'},
  {name:'GPTZero',url:'https://gptzero.me/',category:'Detección IA',tags:['Análisis','Filtro'],description:'Analizador forense de textos diseñado para detectar patrones típicos de redacción automatizada.'},
  {name:'BypassGPT',url:'https://bypassgpt.ai/',category:'Humanización',tags:['Redacción','Filtro'],description:'Reescritor de contenidos enfocado en suavizar las estructuras para eludir falsos positivos de software detector.'},
  {name:'WolframAlpha',url:'https://www.wolframalpha.com/',category:'Ciencia',tags:['Matemáticas','Datos'],description:'Motor de conocimiento experto y computación simbólica para resolver complejas fórmulas científicas.'},
  {name:'Tripo3D',url:'https://www.tripo3d.ai/',category:'3D IA',tags:['Modelado','Motores'],description:'Transforma imágenes estáticas o texto descriptivo en mallas tridimensionales listas para videojuegos.'}
];

let selectedTags = [];
let editIndex = null;

// GESTIÓN DE CONFIGURACIÓN DE TEMA
function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  const target = current === 'dark' ? 'light' : 'dark';
  document.documentElement.setAttribute('data-theme', target);
}

// DROPDOWN MULTISELECCIÓN
function toggleDropdown() {
  document.getElementById('dropdownContent').classList.toggle('show');
}

// Cerrar dropdown al hacer clic fuera
window.onclick = function(event) {
  if (!event.target.matches('.select-box') && !event.target.matches('.select-box *') && !event.target.matches('.dropdown-item') && !event.target.matches('.dropdown-item *')) {
    document.getElementById('dropdownContent').classList.remove('show');
  }
}

function getUniqueTags() {
  const tags = new Set();
  tools.forEach(t => t.tags.forEach(tag => tags.add(tag)));
  return Array.from(tags).sort();
}

function renderDropdown() {
  const container = document.getElementById('dropdownContent');
  container.innerHTML = '';
  const uniqueTags = getUniqueTags();

  uniqueTags.forEach(tag => {
    const isChecked = selectedTags.includes(tag);
    container.innerHTML += `
      <label class="dropdown-item">
        <input type="checkbox" value="${tag}" ${isChecked ? 'checked' : ''} onchange="handleTagChange(this)">
        ${tag}
      </label>
    `;
  });
  updateCountText();
}

function handleTagChange(checkbox) {
  if (checkbox.checked) {
    selectedTags.push(checkbox.value);
  } else {
    selectedTags = selectedTags.filter(t => t !== checkbox.value);
  }
  updateCountText();
  renderCategories();
}

function updateCountText() {
  const label = document.getElementById('selectedCount');
  if (selectedTags.length === 0) {
    label.innerText = "Todas las etiquetas";
  } else {
    label.innerText = `${selectedTags.length} Seleccionada(s)`;
  }
}

// RENDERIZADO PRINCIPAL DE TARJETAS
function renderCategories() {
  const container = document.getElementById('categoriesContainer');
  const query = document.getElementById('search').value.toLowerCase();
  container.innerHTML = '';

  const categories = [...new Set(tools.map(t => t.category))].sort();

  categories.forEach(category => {
    const filtered = tools.filter(tool => {
      const matchesSearch = tool.name.toLowerCase().includes(query) || tool.description.toLowerCase().includes(query);
      const matchesTags = selectedTags.length === 0 || selectedTags.every(t => tool.tags.includes(t));
      return tool.category === category && matchesSearch && matchesTags;
    });

    if (filtered.length === 0) return;

    const block = document.createElement('div');
    block.className = 'category-block';
    
    block.innerHTML = `
      <h2 class="category-title">${category}</h2>
      <div class="apps-grid">
        ${filtered.map(tool => {
          let hostname = '';
          try { hostname = new URL(tool.url).hostname; } catch(e) { hostname = 'google.com'; }
          return `
            <a class="app-card" href="${tool.url}" target="_blank">
              <div class="app-header-inline">
                <div class="app-icon">
                  <img src="https://www.google.com/s2/favicons?domain=${hostname}&sz=128" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5278/5278402.png'">
                </div>
                <div class="app-name">${tool.name}</div>
              </div>
              <p class="app-desc">${tool.description}</p>
              <div class="tooltip-tags">
                ${tool.tags.map(tag => `<span class="tooltip-tag">${tag}</span>`).join('')}
              </div>
            </a>
          `;
        }).join('')}
      </div>
    `;
    container.appendChild(block);
  });
  renderAdminList();
}

// PANEL DE ADMINISTRACIÓN
function toggleAdminPanel() {
  document.getElementById('adminPanel').classList.toggle('hidden');
}

function renderAdminList() {
  const list = document.getElementById('adminList');
  list.innerHTML = '';

  tools.forEach((tool, index) => {
    list.innerHTML += `
      <div class="admin-item">
        <div style="display:flex; justify-content:space-between; font-weight:500;">
          <span>${tool.name}</span>
          <span style="color:var(--muted); font-size:11px;">${tool.category}</span>
        </div>
        <div class="admin-actions">
          <button class="edit-action" onclick="editTool(${index})">Editar</button>
          <button class="delete-action" onclick="deleteTool(${index})">Eliminar</button>
        </div>
      </div>
    `;
  });
}

function saveTool() {
  const name = document.getElementById('toolName').value.trim();
  const url = document.getElementById('toolUrl').value.trim();
  const category = document.getElementById('toolCategory').value.trim();
  const tagsStr = document.getElementById('toolTags').value;
  const description = document.getElementById('toolDescription').value.trim();

  if(!name || !url || !category) return alert("Por favor rellena Nombre, URL y Categoría.");

  const tool = {
    name,
    url,
    category,
    tags: tagsStr.split(',').map(t => t.trim()).filter(t => t !== ""),
    description
  };

  if (editIndex === null) {
    tools.push(tool);
  } else {
    tools[editIndex] = tool;
    editIndex = null;
  }

  localStorage.setItem('aihub_tools', JSON.stringify(tools));
  
  // Limpiar formulario
  document.getElementById('toolName').value = '';
  document.getElementById('toolUrl').value = '';
  document.getElementById('toolCategory').value = '';
  document.getElementById('toolTags').value = '';
  document.getElementById('toolDescription').value = '';

  renderDropdown();
  renderCategories();
}

function editTool(index) {
  editIndex = index;
  const tool = tools[index];
  document.getElementById('toolName').value = tool.name;
  document.getElementById('toolUrl').value = tool.url;
  document.getElementById('toolCategory').value = tool.category;
  document.getElementById('toolTags').value = tool.tags.join(', ');
  document.getElementById('toolDescription').value = tool.description;
  document.querySelector('.admin-form').scrollIntoView({ behavior: 'smooth' });
}

function deleteTool(index) {
  if(confirm("¿Eliminar herramienta?")) {
    tools.splice(index, 1);
    localStorage.setItem('aihub_tools', JSON.stringify(tools));
    renderDropdown();
    renderCategories();
  }
}

document.getElementById('search').addEventListener('input', renderCategories);

// ARRANCAR APLICACIÓN
renderDropdown();
renderCategories();
</script>
</body>
</html>
