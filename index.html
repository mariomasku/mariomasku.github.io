<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Hub OS</title>
  <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/5278/5278402.png">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/5278/5278402.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    /* VARIABLES DE TEMA */
    :root {
      --bg: #0f111a;
      --sidebar: #151824;
      --card: #1c2030;
      --card-hover: #23293d;
      --border: rgba(255, 255, 255, 0.06);
      --input-bg: #1c2030;
      --text: #f3f4f6;
      --muted: #9ca3af;
      --accent: #4f46e5;
      --accent-hover: #6366f1;
      --shadow: rgba(0, 0, 0, 0.4);
    }

    [data-theme="light"] {
      --bg: #f8fafc;
      --sidebar: #ffffff;
      --card: #ffffff;
      --card-hover: #f1f5f9;
      --border: rgba(0, 0, 0, 0.06);
      --input-bg: #f1f5f9;
      --text: #0f172a;
      --muted: #64748b;
      --accent: #4f46e5;
      --accent-hover: #3730a3;
      --shadow: rgba(0, 0, 0, 0.08);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      transition: background-color 0.2s, border-color 0.2s, color 0.2s;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
    }

    body.modal-open {
      overflow: hidden; /* Bloquea el scroll principal */
    }

    /* CLASE CRÍTICA DE CONTROL DE VISIBILIDAD */
    .hidden {
      display: none !important;
    }

    .layout {
      display: flex;
    }

    /* BARRA LATERAL */
    .sidebar {
      width: 280px;
      background: var(--sidebar);
      border-right: 1px solid var(--border);
      padding: 24px;
      position: sticky;
      top: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      gap: 20px;
      z-index: 10;
    }

    .brand {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .brand-logo {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: white;
      font-weight: 700;
      font-size: 15px;
    }

    .brand h1 { font-size: 18px; font-weight: 600; }
    .brand p { color: var(--muted); font-size: 12px; }

    .search {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .search:focus { border-color: var(--accent); }

    .sidebar-section {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-height: 0;
    }

    .sidebar-section h3 {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 10px;
    }

    /* CONTENEDOR DE ETIQUETAS */
    .tags-scroll-container {
      flex: 1;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow-y: auto;
      padding: 10px;
    }

    .tag-checkbox-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      font-size: 13px;
      cursor: pointer;
      border-radius: 6px;
    }
    .tag-checkbox-item:hover { background: var(--card-hover); }

    .sidebar-footer {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .btn-action {
      width: 100%;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      padding: 11px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      font-size: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-action:hover { background: var(--card-hover); }
    .btn-primary-sidebar { background: var(--accent); color: white; border: none; }
    .btn-primary-sidebar:hover { background: var(--accent-hover); }

    /* CONTENIDO PRINCIPAL */
    .content {
      flex: 1;
      padding: 40px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .category-block {
      margin-bottom: 32px;
      padding: 14px;
      border: 2px solid transparent;
      border-radius: 12px;
    }
    
    /* Feedback visual al arrastrar categorías */
    .category-block.drag-over-cat {
      border-color: var(--accent);
      background: rgba(79, 70, 229, 0.04);
    }

    .category-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      cursor: grab;
      user-select: none;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .category-title:active { cursor: grabbing; background: var(--input-bg); }
    .category-title::before {
      content: "⋮⋮";
      color: var(--muted);
      font-size: 13px;
      opacity: 0.6;
    }

    /* REJILLA ULTRA COMPACTA */
    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 12px;
      min-height: 60px; /* Margen para poder soltar tarjetas en bloques vacíos */
    }

    .app-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      text-decoration: none;
      color: inherit;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 6px var(--shadow);
      cursor: grab;
    }
    .app-card:active { cursor: grabbing; opacity: 0.5; }
    .app-card:hover {
      transform: translateY(-1px);
      background: var(--card-hover);
      border-color: var(--accent);
    }

    .app-icon {
      width: 34px;
      height: 34px;
      border-radius: 8px;
      background: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      flex-shrink: 0;
    }
    .app-icon img { width: 22px; height: 22px; object-fit: contain; }

    .app-info {
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .app-name { font-weight: 600; font-size: 13.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .app-desc { font-size: 11.5px; color: var(--muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* MODAL DE ADMINISTRACIÓN CENTRADO */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(5px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .admin-modal {
      background: var(--sidebar);
      border: 1px solid var(--border);
      width: 90%;
      max-width: 650px;
      max-height: 85vh;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 20px 50px var(--shadow);
      overflow: hidden;
    }

    .modal-header {
      padding: 20px 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-header h2 { font-size: 18px; font-weight: 600; }

    .modal-body {
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .admin-form input, .admin-form textarea {
      width: 100%;
      margin-bottom: 10px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }
    .admin-form input:focus, .admin-form textarea:focus { border-color: var(--accent); }

    /* LISTA DE EDICIÓN INTERNA */
    .admin-list-container {
      border-top: 1px solid var(--border);
      padding-top: 15px;
    }
    .admin-list-container h4 { font-size: 13px; color: var(--muted); margin-bottom: 10px; }
    
    .admin-scroll-list {
      max-height: 220px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
    }

    .admin-item {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 8px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
    }

    .admin-item-actions { display: flex; gap: 6px; }
    .admin-item-actions button {
      border: none;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 11px;
      color: white;
    }
    .btn-edit { background: #4b5563; }
    .btn-delete { background: #dc2626; }

    @media(max-width: 768px) {
      .layout { flex-direction: column; }
      .sidebar { width: 100%; height: auto; position: relative; }
      .content { padding: 20px; }
    }
  </style>
</head>

// PERSISTENCIA DEL ORDEN DE CATEGORÍAS
let categoryOrder = JSON.parse(localStorage.getItem('aihub_category_order')) || [];

let selectedTags = [];
let editIndex = null;

// CONTROL DE ESTADO GLOBAL PARA DRAG & DROP
let dragType = null; // 'card' o 'category'
let draggedCardId = null;
let draggedCategoryName = null;

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme');
  document.documentElement.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
}

function getUniqueTags() {
  const tags = new Set();
  tools.forEach(t => { if(t.tags) t.tags.forEach(tag => tags.add(tag)); });
  return Array.from(tags).sort();
}

function renderTagsMenu() {
  const container = document.getElementById('tagsContainer');
  container.innerHTML = '';
  const uniqueTags = getUniqueTags();

  uniqueTags.forEach(tag => {
    const isChecked = selectedTags.includes(tag);
    container.innerHTML += `
      <label class="tag-checkbox-item">
        <input type="checkbox" value="${tag}" ${isChecked ? 'checked' : ''} onchange="handleTagFilterChange(this)">
        <span>${tag}</span>
      </label>
    `;
  });
}

function handleTagFilterChange(checkbox) {
  if (checkbox.checked) {
    selectedTags.push(checkbox.value);
  } else {
    selectedTags = selectedTags.filter(t => t !== checkbox.value);
  }
  renderCategories();
}

function syncCategoryOrder() {
  const currentCategories = [...new Set(tools.map(t => t.category))];
  categoryOrder = categoryOrder.filter(c => currentCategories.includes(c));
  currentCategories.forEach(c => {
    if (!categoryOrder.includes(c)) categoryOrder.push(c);
  });
  localStorage.setItem('aihub_category_order', JSON.stringify(categoryOrder));
}

// RENDERIZADO PRINCIPAL CON LOS LISTENERS DE ARRASTRE SEPARADOS
function renderCategories() {
  syncCategoryOrder();
  const container = document.getElementById('categoriesContainer');
  const query = document.getElementById('search').value.toLowerCase();
  container.innerHTML = '';

  categoryOrder.forEach((category) => {
    const filteredTools = tools.filter(tool => {
      if (tool.category !== category) return false;
      const matchesSearch = tool.name.toLowerCase().includes(query) || tool.description.toLowerCase().includes(query);
      const matchesTags = selectedTags.length === 0 || (tool.tags && selectedTags.every(t => tool.tags.includes(t)));
      return matchesSearch && matchesTags;
    });

    if (filteredTools.length === 0 && query !== '') return;

    const block = document.createElement('div');
    block.className = 'category-block';
    block.setAttribute('data-catname', category);
    
    // El bloque entero escucha el dragover/drop para saber si le cae una categoría o una tarjeta
    block.addEventListener('dragover', (e) => handleBlockDragOver(e, block));
    block.addEventListener('dragleave', () => block.classList.remove('drag-over-cat'));
    block.addEventListener('drop', (e) => handleBlockDrop(e, category));

    block.innerHTML = `
      <h2 class="category-title" draggable="true">${category}</h2>
      <div class="apps-grid" data-gridcat="${category}">
        ${filteredTools.map((tool) => {
          let hostname = '';
          try { hostname = new URL(tool.url).hostname; } catch(e) { hostname = 'google.com'; }
          return `
            <a class="app-card" href="${tool.url}" target="_blank" title="${tool.description}"
               draggable="true" 
               data-toolid="${tool.id}"
               data-toolcat="${category}">
              <div class="app-icon">
                <img src="https://www.google.com/s2/favicons?domain=${hostname}&sz=128" onerror="this.src='https://cdn-icons-png.flaticon.com/512/5278/5278402.png'">
              </div>
              <div class="app-info">
                <div class="app-name">${tool.name}</div>
                <div class="app-desc">${tool.description}</div>
              </div>
            </a>
          `;
        }).join('')}
      </div>
    `;

    // Asignar eventos de arrastre al TÍTULO (Para mover categorías)
    const titleElem = block.querySelector('.category-title');
    titleElem.addEventListener('dragstart', (e) => handleCategoryDragStart(e, category));

    // Asignar eventos de arrastre a las TARJETAS (Para mover registros)
    block.querySelectorAll('.app-card').forEach(card => {
      const cardId = card.getAttribute('data-toolid');
      card.addEventListener('dragstart', (e) => handleCardDragStart(e, cardId));
      card.addEventListener('dragover', (e) => e.preventDefault());
      card.addEventListener('drop', (e) => handleCardDrop(e, cardId, category));
    });

    container.appendChild(block);
  });

  renderAdminList();
}

/* ================= LÓGICA DE DRAG & DROP SEPARADA INTERNA ================= */

// Al iniciar el arrastre de una tarjeta
function handleCardDragStart(e, toolId) {
  dragType = 'card';
  draggedCardId = toolId;
  e.dataTransfer.setData('text/plain', toolId);
  e.stopPropagation();
}

// Al soltar una tarjeta encima de OTRA tarjeta
function handleCardDrop(e, targetToolId, targetCategory) {
  e.preventDefault();
  e.stopPropagation();

  if (dragType !== 'card') return;

  const fromIndex = tools.findIndex(t => t.id.toString() === draggedCardId.toString());
  const toIndex = tools.findIndex(t => t.id.toString() === targetToolId.toString());

  if (fromIndex > -1 && toIndex > -1 && fromIndex !== toIndex) {
    const draggedItem = tools[fromIndex];
    draggedItem.category = targetCategory; // Transfiere de categoría automáticamente si cambia de bloque

    tools.splice(fromIndex, 1);
    const newToIndex = tools.findIndex(t => t.id.toString() === targetToolId.toString());
    tools.splice(newToIndex, 0, draggedItem);

    localStorage.setItem('aihub_tools', JSON.stringify(tools));
    renderCategories();
  }
}

// Al iniciar el arrastre de una Categoría (Desde su título handle)
function handleCategoryDragStart(e, categoryName) {
  dragType = 'category';
  draggedCategoryName = categoryName;
  e.stopPropagation();
}

function handleBlockDragOver(e, blockElement) {
  e.preventDefault();
  if (dragType === 'category') {
    blockElement.classList.add('drag-over-cat');
  }
}

// Al soltar elementos en el contenedor general del bloque de categoría
function handleBlockDrop(e, targetCategoryName) {
  e.preventDefault();
  
  if (dragType === 'category') {
    if (draggedCategoryName !== targetCategoryName) {
      const fromIndex = categoryOrder.indexOf(draggedCategoryName);
      const toIndex = categoryOrder.indexOf(targetCategoryName);
      
      if (fromIndex > -1 && toIndex > -1) {
        categoryOrder.splice(fromIndex, 1);
        categoryOrder.splice(toIndex, 0, draggedCategoryName);
        localStorage.setItem('aihub_category_order', JSON.stringify(categoryOrder));
        renderCategories();
      }
    }
  } else if (dragType === 'card') {
    // Si la tarjeta cae en una zona vacía del bloque o sobre una rejilla sin items
    const fromIndex = tools.findIndex(t => t.id.toString() === draggedCardId.toString());
    if (fromIndex > -1) {
      const draggedItem = tools[fromIndex];
      if (draggedItem.category !== targetCategoryName) {
        draggedItem.category = targetCategoryName;
        localStorage.setItem('aihub_tools', JSON.stringify(tools));
        renderCategories();
      }
    }
  }
  document.querySelectorAll('.category-block').forEach(b => b.classList.remove('drag-over-cat'));
}

/* ================= CONTROL DE MODAL CENTRALIZADO ================= */
function openAdminPanel() {
  document.getElementById('modalOverlay').classList.remove('hidden');
  document.body.classList.add('modal-open');
  renderAdminList();
}

function closeAdminPanel() {
  document.getElementById('modalOverlay').classList.add('hidden');
  document.body.classList.remove('modal-open');
  editIndex = null;
}

function closeAdminPanelOutside(e) {
  closeAdminPanel();
}

function renderAdminList() {
  const list = document.getElementById('adminScrollList');
  list.innerHTML = '';

  tools.forEach((tool, index) => {
    list.innerHTML += `
      <div class="admin-item">
        <div style="display:flex; flex-direction:column; gap:2px; max-width:70%;">
          <strong style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${tool.name}</strong>
          <span style="color:var(--muted); font-size:11px;">Categoría: ${tool.category}</span>
        </div>
        <div class="admin-item-actions">
          <button class="btn-edit" onclick="editTool(${index})">Editar</button>
          <button class="btn-delete" onclick="deleteTool(${index})">Borrar</button>
        </div>
      </div>
    `;
  });
}

function saveTool() {
  const name = document.getElementById('toolName').value.trim();
  const url = document.getElementById('toolUrl').value.trim();
  const category = document.getElementById('toolCategory').value.trim();
  const tagsStr = document.getElementById('toolTags').value;
  const description = document.getElementById('toolDescription').value.trim();

  if(!name || !url || !category) return alert("Por favor completa al menos: Nombre, URL y Categoría.");

  const tool = {
    id: editIndex !== null ? tools[editIndex].id : Date.now(),
    name,
    url,
    category,
    tags: tagsStr.split(',').map(t => t.trim()).filter(t => t !== ""),
    description
  };

  if (editIndex === null) {
    tools.push(tool);
  } else {
    tools[editIndex] = tool;
    editIndex = null;
  }

  localStorage.setItem('aihub_tools', JSON.stringify(tools));
  
  document.getElementById('toolName').value = '';
  document.getElementById('toolUrl').value = '';
  document.getElementById('toolCategory').value = '';
  document.getElementById('toolTags').value = '';
  document.getElementById('toolDescription').value = '';

  renderTagsMenu();
  renderCategories();
}

function editTool(index) {
  editIndex = index;
  const tool = tools[index];
  document.getElementById('toolName').value = tool.name;
  document.getElementById('toolUrl').value = tool.url;
  document.getElementById('toolCategory').value = tool.category;
  document.getElementById('toolTags').value = tool.tags ? tool.tags.join(', ') : '';
  document.getElementById('toolDescription').value = tool.description;
}

function deleteTool(index) {
  if(confirm(`¿Estás seguro de que quieres eliminar esta herramienta?`)) {
    tools.splice(index, 1);
    localStorage.setItem('aihub_tools', JSON.stringify(tools));
    renderTagsMenu();
    renderCategories();
  }
}

document.getElementById('search').addEventListener('input', renderCategories);

// RESET INICIAL LIMPIO DE CACHÉ VIEJA DE LA SESIÓN ANTERIOR (Opcional, para forzar los 44)
if(!localStorage.getItem('aihub_tools') || JSON.parse(localStorage.getItem('aihub_tools')).length < 20) {
  localStorage.setItem('aihub_tools', JSON.stringify(tools));
}

// INICIALIZACIÓN
renderTagsMenu();
renderCategories();
</script>
